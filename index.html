<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>NANGKEPINSERA</title>

<style>
  :root {
    --bg:#020617;
    --card1:#0f172a;
    --card2:#020617;
    --text:#e5e7eb;
    --accent:#22c55e;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    width: 240px;
    height: 160px;
    padding: 14px;
    background: linear-gradient(140deg,#020617,#020617);
    font-family: system-ui, sans-serif;
    color: var(--text);
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 18px;
    padding: 16px;
    background: linear-gradient(180deg,var(--card1),var(--card2));
    box-shadow: 0 10px 28px rgba(0,0,0,.55);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .4px;
    text-align: center;
  }

  button {
    height: 40px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg,#22c55e,#16a34a);
    color: #052e16;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(34,197,94,.45);
    transition: transform .12s ease;
  }

  button:hover { transform: translateY(-1px); }
  button:active { transform: scale(.96); }
  
  body {
  height: auto;
  max-height: 520px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="card">
  <canvas id="particles"></canvas>

  <div class="content">
    <div class="title">NANGKEPINSERA</div>
    <button id="btnGrab">Grab & Download</button>
  </div>
</div>

<div style="margin-top:12px">
  <button id="btnSummary" style="width:100%;height:36px">
    Ambil Summary
  </button>

  <textarea
    id="summaryResult"
    style="
      margin-top:8px;
      width:100%;
      height:120px;
      border-radius:12px;
      background:#020617;
      color:#e5e7eb;
      padding:8px;
      resize:none;"
    placeholder="Hasil summary siap copy..."
  ></textarea>
</div>




<script src="popup.js"></script>
</body>
</html>
